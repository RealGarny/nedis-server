services:
  db:
    image: postgres:18 # или новее — закрепляй мажорную версию явно, не latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: nedisroot
      POSTGRES_PASSWORD: nedis_password # только для локалки; в проде — секреты/env
      POSTGRES_DB: nedisdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # данные переживают пересоздание контейнера
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d nedisdb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
